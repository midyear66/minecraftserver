services:
  mc_proxy:
    build: ./proxy
    container_name: mc_proxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./proxy:/app/config
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - ./mc_data:/mc_data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys,time; sys.exit(0 if time.time()-os.path.getmtime('/app/config/proxy_state.json')<30 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mc_admin:
    build: ./admin
    container_name: mc_admin
    restart: unless-stopped
    user: "1000:1000"
    group_add:
      - "${DOCKER_GID:-999}"
    ports:
      - "8080:8080"
    volumes:
      - ./proxy:/config
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - ./mc_data:/mc_data
      - ./backups:/backups
    env_file:
      - ./.env
    environment:
      - HOST_DATA_DIR=${HOST_DATA_DIR}
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/login', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
